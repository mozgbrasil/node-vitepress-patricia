<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <title>MOZG OpenAPI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Swagger UI publica da camada serverless do site MOZG, com contrato OpenAPI auditavel e aliases previsiveis."
    />
    <meta name="robots" content="index,follow,max-image-preview:large" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <link rel="canonical" href="https://mozg.com.br/openapi/" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5.18.2/swagger-ui.css"
    />
    <style>
      :root {
        color-scheme: light;
        --bg: #061226;
        --panel: rgba(7, 18, 38, 0.92);
        --line: rgba(148, 163, 184, 0.22);
        --text: #e2e8f0;
        --muted: #94a3b8;
        --accent: #f97316;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(
            circle at top,
            rgba(249, 115, 22, 0.16),
            transparent 32%
          ),
          linear-gradient(
            180deg,
            #020817 0%,
            #0f172a 52%,
            #e2e8f0 52%,
            #f8fafc 100%
          );
        color: var(--text);
        font-family: 'Manrope', 'Segoe UI', sans-serif;
      }

      .shell {
        padding: 24px;
      }

      .hero {
        max-width: 1120px;
        margin: 0 auto 24px;
        padding: 24px;
        border: 1px solid var(--line);
        border-radius: 24px;
        background: var(--panel);
        box-shadow: 0 24px 80px rgba(2, 6, 23, 0.35);
      }

      .eyebrow {
        margin: 0 0 12px;
        color: var(--accent);
        text-transform: uppercase;
        letter-spacing: 0.12em;
        font-size: 0.8rem;
        font-weight: 800;
      }

      h1 {
        margin: 0;
        font-size: clamp(2rem, 5vw, 3.2rem);
        line-height: 1.05;
      }

      .lead {
        max-width: 760px;
        margin: 14px 0 0;
        color: var(--muted);
        font-size: 1rem;
        line-height: 1.7;
      }

      .links {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 18px;
      }

      .links a {
        color: #fff;
        text-decoration: none;
        padding: 10px 14px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.14);
        background: rgba(255, 255, 255, 0.06);
      }

      .links a:hover {
        border-color: rgba(249, 115, 22, 0.7);
      }

      #swagger-ui {
        max-width: 1120px;
        margin: 0 auto;
        padding: 18px;
        border-radius: 24px;
        background: #ffffff;
        box-shadow: 0 24px 80px rgba(15, 23, 42, 0.18);
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <p class="eyebrow">MOZG public API</p>
        <h1>OpenAPI padrao para a camada publica e auditavel</h1>
        <p class="lead">
          Esta superficie expõe o contrato JSON em
          <code>/api/openapi.json</code>, o alias versionado em
          <code>/api/v1/openapi.json</code> e um shell de navegacao coerente com
          o site principal.
        </p>
        <nav class="links" aria-label="OpenAPI links">
          <a href="/api/openapi.json">Contrato JSON</a>
          <a href="/api/v1/openapi.json">Alias versionado</a>
          <a href="/api">API e auditoria</a>
          <a href="/docs/">Alias /docs/</a>
        </nav>
      </section>
      <section id="swagger-ui"></section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5.18.2/swagger-ui-bundle.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5.18.2/swagger-ui-standalone-preset.js"></script>
    <script>
      window.addEventListener('load', () => {
        window.ui = SwaggerUIBundle({
          url: '/api/openapi.json',
          dom_id: '#swagger-ui',
          deepLinking: true,
          presets: [SwaggerUIBundle.presets.apis, SwaggerUIStandalonePreset],
          layout: 'BaseLayout',
        });
      });
    </script>
  </body>
</html>
